<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humanitarian Crisis Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: calc(100vh - 80px); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 overflow-hidden h-screen flex flex-col">

    <!-- Top Panel: Brand and Tabs -->
    <header class="h-16 bg-white border-b border-gray-100 flex items-center px-6 justify-between z-10">
        <div class="flex items-center space-x-8">
            <h1 class="text-xl font-black text-blue-900 tracking-tight italic">UN DATATHON <span class="text-gray-400 font-light">2026</span></h1>
            <nav class="flex space-x-1 bg-gray-100 p-1 rounded-lg">
                <button onclick="switchTab('map')" class="px-4 py-1.5 rounded-md transition-all tab-btn active bg-white shadow-sm font-bold text-sm">Map View</button>
                <button onclick="switchTab('list')" class="px-4 py-1.5 rounded-md transition-all tab-btn hover:bg-white/50 text-sm text-gray-600" hx-get="/list" hx-target="#list-container" hx-trigger="click">List View</button>
            </nav>
        </div>
        <div class="text-xs font-bold text-gray-400 uppercase tracking-widest hidden md:block">
            Humanitarian Crisis Dashboard v1.0
        </div>
    </header>

    <!-- Filter Bar: Dedicated Full-Width Section -->
    <section class="h-16 bg-white border-b border-gray-200 flex items-center px-6 shadow-sm z-10">
        <div class="w-full max-w-7xl mx-auto flex flex-col md:flex-row space-y-2 md:space-y-0 md:space-x-4 items-center">
            <div class="relative w-full md:w-96">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" 
                       name="search" 
                       placeholder="Filter by crisis name or region..." 
                       class="w-full border border-gray-300 rounded-lg pl-10 pr-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                       hx-get="/list" 
                       hx-target="#list-container" 
                       hx-trigger="keyup changed delay:300ms"
                       hx-include="[name='sort']">
            </div>
            
            <div class="flex items-center space-x-2 w-full md:w-auto">
                <label class="text-xs font-bold text-gray-400 uppercase whitespace-nowrap">Sort By</label>
                <select name="sort" 
                        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2"
                        hx-get="/list" 
                        hx-target="#list-container" 
                        hx-trigger="change"
                        hx-include="[name='search']">
                    <option value="title">Alphabetical</option>
                    <option value="severity">Highest Severity</option>
                    <option value="impact">Largest Impact</option>
                </select>
            </div>
            
            <div class="flex-grow"></div>
            
            <div id="result-count" class="text-xs font-semibold text-gray-500">
                <!-- Can be updated dynamically if needed -->
            </div>
        </div>
    </section>

    <!-- Main View Area -->
    <main class="flex-grow flex flex-row overflow-hidden bg-gray-50">
        <!-- Tab Content Wrapper -->
        <div class="flex-grow relative overflow-hidden">
            <!-- Map Tab -->
            <div id="tab-map" class="tab-content active absolute inset-0">
                <div id="map" class="w-full h-full"></div>
            </div>

            <!-- List Tab -->
            <div id="tab-list" class="tab-content absolute inset-0 overflow-y-auto p-6">
                <div class="max-w-7xl mx-auto">
                    <div id="list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- HTMX will inject list_items.html here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Unified Side Panel (Right) -->
        <div id="side-panel" 
             class="h-full w-0 border-l border-transparent transition-all duration-300 ease-in-out bg-white overflow-hidden z-20 shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.1)]">
            <!-- Fixed width container inside to prevent content reflow during width transition -->
            <div id="side-panel-content" class="w-[450px] lg:w-[500px] h-full overflow-y-auto">
                <!-- HTMX will inject side_panel.html here -->
            </div>
        </div>
    </main>

    <script>
        // Selection Tracking
        let selectedCrisisId = null;
        let mapCircles = {};

        // Map Initialization
        const map = L.map('map').setView([10, 20], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
        }).addTo(map);

        // Fetch Map Data and Draw Circles
        async function loadMapData() {
            const response = await fetch('/api/map-data');
            const data = await response.json();
            
            data.forEach(crisis => {
                const baseColor = crisis.display.color_metric > 8 ? '#b91c1c' : 
                                 crisis.display.color_metric > 5 ? '#f97316' : '#facc15';
                
                const circle = L.circle([crisis.display.lat, crisis.display.lng], {
                    color: baseColor,
                    fillColor: baseColor,
                    fillOpacity: 0.6,
                    weight: 2,
                    radius: crisis.display.radius_metric
                }).addTo(map);

                // Store reference for selection
                circle.baseColor = baseColor;
                mapCircles[crisis.id] = circle;

                circle.bindTooltip(`
                    <div class="p-1">
                        <div class="font-bold text-lg">${crisis.display.title}</div>
                        <div class="text-sm text-gray-600 mb-1">${crisis.summary.brief_text}</div>
                        <div class="text-xs font-semibold text-blue-600">${crisis.summary.key_stat_1}</div>
                    </div>
                `, { direction: 'top' });

                circle.on('click', function() {
                    updateSelection(crisis.id);
                    htmx.ajax('GET', `/details/${crisis.id}`, {
                        target: '#side-panel-content',
                        swap: 'innerHTML'
                    });
                });
            });
        }

        loadMapData();

        function updateSelection(id) {
            // 1. Clear previous selections
            if (selectedCrisisId && mapCircles[selectedCrisisId]) {
                const prevCircle = mapCircles[selectedCrisisId];
                prevCircle.setStyle({ color: prevCircle.baseColor, weight: 2, fillOpacity: 0.6 });
            }
            document.querySelectorAll('.crisis-card').forEach(card => {
                card.classList.remove('border-blue-500', 'ring-4', 'ring-blue-100', 'bg-blue-50/30');
                card.classList.add('border-gray-200');
            });

            // 2. Set new selection
            selectedCrisisId = id;
            
            // Update Map
            if (mapCircles[id]) {
                const circle = mapCircles[id];
                circle.setStyle({ color: '#1d4ed8', weight: 5, fillOpacity: 0.8 });
                circle.bringToFront();
            }

            // Update List (if card exists in DOM)
            const card = document.getElementById(`card-${id}`);
            if (card) {
                card.classList.remove('border-gray-200');
                card.classList.add('border-blue-500', 'ring-4', 'ring-blue-100', 'bg-blue-50/30');
                card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // UI Helpers
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('bg-white', 'shadow-sm', 'font-semibold');
                el.classList.add('hover:bg-white/50');
            });

            const activeBtn = event.currentTarget;
            activeBtn.classList.remove('hover:bg-white/50');
            activeBtn.classList.add('bg-white', 'shadow-sm', 'font-semibold');

            document.getElementById(`tab-${tab}`).classList.add('active');
            
            if (tab === 'map') {
                setTimeout(() => map.invalidateSize(), 100);
            } else if (tab === 'list' && selectedCrisisId) {
                // Re-apply list selection when switching back to list tab
                setTimeout(() => updateSelection(selectedCrisisId), 50);
            }
        }

        function openSidePanel() {
            const panel = document.getElementById('side-panel');
            panel.classList.remove('w-0', 'border-transparent');
            panel.classList.add('w-[450px]', 'lg:w-[500px]', 'border-gray-200');
            setTimeout(() => map.invalidateSize(), 310);
        }

        function closeSidePanel() {
            const panel = document.getElementById('side-panel');
            panel.classList.remove('w-[450px]', 'lg:w-[500px]', 'border-gray-200');
            panel.classList.add('w-0', 'border-transparent');
            
            // Clear selections when closing
            if (selectedCrisisId && mapCircles[selectedCrisisId]) {
                const circle = mapCircles[selectedCrisisId];
                circle.setStyle({ color: circle.baseColor, weight: 2, fillOpacity: 0.6 });
            }
            document.querySelectorAll('.crisis-card').forEach(card => {
                card.classList.remove('border-blue-500', 'ring-4', 'ring-blue-100', 'bg-blue-50/30');
                card.classList.add('border-gray-200');
            });
            selectedCrisisId = null;

            setTimeout(() => map.invalidateSize(), 310);
        }

        // Listen for HTMX events
        document.body.addEventListener('htmx:afterOnLoad', function(evt) {
            if (evt.detail.target.id === 'side-panel-content') {
                openSidePanel();
            }
            // If the list was re-loaded (search/sort), re-apply selection if applicable
            if (evt.detail.target.id === 'list-container' && selectedCrisisId) {
                updateSelection(selectedCrisisId);
            }
        });

        // Global listener for list item clicks to sync with map
        document.body.addEventListener('click', function(e) {
            const card = e.target.closest('.crisis-card');
            if (card) {
                updateSelection(card.dataset.crisisId);
            }
        });
    </script>
</body>
</html>
