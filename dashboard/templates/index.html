<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humanitarian Crisis Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        #map { height: calc(100vh - 80px); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .crisis-tooltip {
            white-space: normal;
            width: max-content;
            max-width: min(70vw, 560px);
        }
        /* Keep selected map markers visually circular; suppress default rectangular focus ring. */
        .leaflet-container .leaflet-interactive:focus {
            outline: none;
        }
        #nlp-send-btn .loading-spinner { display: none; }
        #nlp-send-btn.htmx-request .send-label { display: none; }
        #nlp-send-btn.htmx-request .loading-spinner { display: inline-flex; }
    </style>
</head>
<body class="bg-gray-100 overflow-hidden h-screen flex flex-col">

    <!-- Top Panel: Brand and Tabs -->
    <header class="h-16 bg-white border-b border-gray-100 flex items-center px-6 justify-between z-10">
        <div class="flex items-center space-x-8">
            <h1 class="text-xl font-black text-blue-900 tracking-tight italic">DATATHON<span class="text-gray-400 font-light">2026</span></h1>
            <nav class="flex space-x-1 bg-gray-100 p-1 rounded-lg">
                <button onclick="switchTab('map')" class="px-4 py-1.5 rounded-md transition-all tab-btn active bg-white shadow-sm font-bold text-sm">Map View</button>
                <button onclick="switchTab('list')" class="px-4 py-1.5 rounded-md transition-all tab-btn hover:bg-white/50 text-sm text-gray-600" hx-get="/list" hx-target="#list-container" hx-trigger="click">List View</button>
            </nav>
        </div>
        <div class="text-xs font-bold text-gray-400 uppercase tracking-widest hidden md:block">
            Humanitarian Crisis Dashboard
        </div>
    </header>

    <!-- Filter Bar: Dedicated Full-Width Section -->
    <section class="bg-white border-b border-gray-200 shadow-sm z-10">
        <!-- NLP Query Row -->
        <div class="h-16 border-b border-gray-100 flex items-center px-6">
            <div class="w-full max-w-7xl mx-auto flex items-center space-x-4">
                <div class="flex-grow flex items-center space-x-2">
                    <input type="text" 
                           id="nlp-query-input"
                           name="query" 
                           placeholder="Type a query (e.g., 'crises in Africa with <10% funding' or 'rank by people in need')..." 
                           class="flex-grow border border-blue-200 bg-blue-50/30 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all font-medium italic"
                           onkeydown="if(event.key==='Enter') document.getElementById('nlp-send-btn').click()">
                    <button id="nlp-send-btn"
                            class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-6 py-2.5 rounded-lg transition-all shadow-sm uppercase tracking-widest inline-flex items-center justify-center min-w-[92px]"
                            hx-post="/nlp-query"
                            hx-target="#active-filters"
                            hx-include="#nlp-query-input">
                        <span class="send-label">SEND</span>
                        <span class="loading-spinner items-center justify-center" aria-label="Loading" role="status">
                            <svg class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
                                <path class="opacity-90" fill="currentColor" d="M12 2a10 10 0 0 1 10 10h-3a7 7 0 0 0-7-7V2z"></path>
                            </svg>
                        </span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Active NLP Filters Display Area -->
        <div class="px-6 py-2 bg-gray-50/50">
            <div id="active-filters" class="w-full max-w-7xl mx-auto min-h-[32px] flex items-center">
                {% include "filter_chips.html" %}
            </div>
        </div>
    </section>

    <!-- Main View Area -->
    <main class="flex-grow flex flex-row overflow-hidden bg-gray-50">
        <!-- Tab Content Wrapper -->
        <div class="flex-grow relative overflow-hidden">
            <!-- Map Tab -->
            <div id="tab-map" class="tab-content active absolute inset-0">
                <div id="map" class="w-full h-full"></div>
            </div>

            <!-- List Tab -->
            <div id="tab-list" class="tab-content absolute inset-0 overflow-y-auto p-6">
                <div class="max-w-7xl mx-auto">
                    <div id="list-container" 
                         class="flex flex-col space-y-4"
                         hx-get="/list"
                         hx-trigger="filters-changed from:body"
                         hx-include="#hidden-filters-input"
                         hx-vals='js:{selected_crisis_id: selectedCrisisId}'>
                        <!-- HTMX will inject list_items.html here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Unified Side Panel (Right) -->
        <div id="side-panel" 
             class="h-full w-0 border-l border-transparent transition-[width,border-color] duration-300 ease-in-out bg-white overflow-visible z-20 shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.1)] relative">
            
            <!-- Resize Handle -->
            <div id="side-panel-resizer" 
                 class="absolute left-0 top-0 bottom-0 w-1.5 cursor-col-resize hover:bg-blue-400/30 transition-colors z-30 group flex items-center justify-center">
                <div class="w-1 h-8 bg-gray-200 rounded-full group-hover:bg-blue-400"></div>
            </div>

            <!-- Container inside to prevent content reflow -->
            <div id="side-panel-content-wrapper" class="w-full h-full overflow-hidden">
                <div id="side-panel-content" class="w-full h-full overflow-y-auto">
                    <!-- HTMX will inject side_panel.html here -->
                </div>
            </div>
        </div>
    </main>

    <script>
        // Selection Tracking
        let selectedCrisisId = null;
        let mapCircles = {};

        // Side Panel Resizing Logic
        const sidePanel = document.getElementById('side-panel');
        const resizer = document.getElementById('side-panel-resizer');
        let isResizing = false;
        let defaultWidth = window.innerWidth >= 1024 ? 700 : 600;

        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
            sidePanel.classList.remove('transition-[width,border-color]', 'duration-300');
            e.preventDefault();
        });

        window.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            
            const newWidth = window.innerWidth - e.clientX;
            // Constrain width
            if (newWidth > 300 && newWidth < window.innerWidth * 0.9) {
                sidePanel.style.width = `${newWidth}px`;
                map.invalidateSize();
            }
        });

        window.addEventListener('mouseup', () => {
            if (!isResizing) return;
            isResizing = false;
            document.body.style.cursor = '';
            sidePanel.classList.add('transition-[width,border-color]', 'duration-300');
        });

        function formatCompactUsd(value) {
            if (value === null || value === undefined || Number.isNaN(Number(value))) {
                return 'Unknown';
            }
            return `$${Number(value).toLocaleString()}`;
        }

        function formatSeverityScore(value) {
            if (value === null || value === undefined || Number.isNaN(Number(value))) {
                return 'Unknown';
            }
            return Number(value).toFixed(3);
        }

        const fundingHoverLinePlugin = {
            id: 'fundingHoverLine',
            beforeEvent(chart, args) {
                const event = args?.event;
                if (!event) return;

                const directHoverElements = chart.getElementsAtEventForMode(
                    event,
                    'nearest',
                    { intersect: true },
                    false,
                );

                if (directHoverElements.length > 0) {
                    chart.$fundingHoverState = {
                        direct: true,
                        datasetIndex: directHoverElements[0].datasetIndex,
                    };
                    return;
                }

                chart.$fundingHoverState = {
                    direct: false,
                    datasetIndex: null,
                };
            },
            afterDatasetsDraw(chart, _args, pluginOptions) {
                const activeElements = chart.tooltip?.getActiveElements?.() || [];
                if (!activeElements.length) return;

                const { ctx, chartArea } = chart;
                const x = activeElements[0].element.x;

                ctx.save();
                ctx.beginPath();
                ctx.moveTo(x, chartArea.top);
                ctx.lineTo(x, chartArea.bottom);
                ctx.lineWidth = 1;
                ctx.setLineDash(pluginOptions?.dash || [4, 4]);
                ctx.strokeStyle = pluginOptions?.color || 'rgba(37, 99, 235, 0.6)';
                ctx.stroke();
                ctx.restore();
            },
        };

        function initFundingLineCharts(root = document) {
            if (typeof Chart === 'undefined') return;

            if (Chart.Tooltip?.positioners && !Chart.Tooltip.positioners.fundingBluePoint) {
                Chart.Tooltip.positioners.fundingBluePoint = function(items, eventPosition) {
                    const hoverState = this.chart?.$fundingHoverState || { direct: false };
                    if (!hoverState.direct) {
                        const blueItem = items.find((item) => item.datasetIndex === 0);
                        if (blueItem?.element) {
                            return { x: blueItem.element.x, y: blueItem.element.y };
                        }
                    }
                    return Chart.Tooltip.positioners.nearest.call(this, items, eventPosition);
                };
            }

            const canvases = root.querySelectorAll('canvas.funding-line-chart');
            canvases.forEach((canvas) => {
                if (canvas._fundingChartInstance) {
                    canvas._fundingChartInstance.destroy();
                }

                const years = JSON.parse(canvas.dataset.years || '[]');
                const percentages = JSON.parse(canvas.dataset.percentages || '[]').map((v) =>
                    v === null || v === undefined ? null : Number(v)
                );
                const avgPercentages = JSON.parse(canvas.dataset.avgPercentages || '[]').map((v) =>
                    v === null || v === undefined ? null : Number(v)
                );
                const funding = JSON.parse(canvas.dataset.funding || '[]');
                const requirements = JSON.parse(canvas.dataset.requirements || '[]');

                const ctx = canvas.getContext('2d');
                if (!ctx) return;

                canvas._fundingChartInstance = new Chart(ctx, {
                    type: 'line',
                    plugins: [fundingHoverLinePlugin],
                    data: {
                        labels: years,
                        datasets: [
                            {
                                label: 'Funding %',
                                data: percentages,
                                borderColor: '#2563eb',
                                backgroundColor: 'rgba(37, 99, 235, 0.15)',
                                pointBackgroundColor: '#1d4ed8',
                                pointBorderColor: '#ffffff',
                                pointBorderWidth: 1,
                                pointRadius: 3,
                                tension: 0.2,
                                spanGaps: true,
                            },
                            {
                                label: 'Year Avg %',
                                data: avgPercentages,
                                borderColor: '#ef4444',
                                backgroundColor: 'transparent',
                                borderDash: [5, 5],
                                borderWidth: 2,
                                pointRadius: 0,
                                pointHoverRadius: 3,
                                pointHitRadius: 8,
                                tension: 0,
                                spanGaps: true,
                            },
                        ],
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false,
                        },
                        scales: {
                            y: {
                                min: 0,
                                max: 100,
                                ticks: {
                                    callback: (value) => `${value}%`,
                                    color: '#6b7280',
                                    font: { size: 10 },
                                },
                                grid: { color: '#e5e7eb' },
                            },
                            x: {
                                ticks: { color: '#6b7280', font: { size: 10 } },
                                grid: { display: false },
                            },
                        },
                        plugins: {
                            fundingHoverLine: {
                                color: 'rgba(37, 99, 235, 0.55)',
                                dash: [5, 4],
                            },
                            legend: { display: false },
                            tooltip: {
                                position: 'fundingBluePoint',
                                filter: (item) => {
                                    const hoverState = item.chart?.$fundingHoverState || { direct: false, datasetIndex: null };
                                    if (hoverState.direct && hoverState.datasetIndex !== null) {
                                        return item.datasetIndex === hoverState.datasetIndex;
                                    }
                                    return item.datasetIndex === 0;
                                },
                                callbacks: {
                                    title: (items) => {
                                        const hoverState = items?.[0]?.chart?.$fundingHoverState || { direct: false };
                                        if (!hoverState.direct) return '';
                                        return `Year ${items[0].label}`;
                                    },
                                    label: (context) => {
                                        const hoverState = context.chart?.$fundingHoverState || { direct: false };
                                        const idx = context.dataIndex;
                                        const pct = context.parsed.y;
                                        const pctText = pct === null || pct === undefined ? 'N/A' : `${pct.toFixed(1)}%`;
                                        if (!hoverState.direct) {
                                            return pctText;
                                        }
                                        if (context.dataset.label === 'Year Avg %') {
                                            return [
                                                `Year benchmark: ${pctText}`,
                                                'Weighted average funding',
                                                'coverage across all projects',
                                                'in this year.',
                                            ];
                                        }
                                        const coverageText = `Coverage: ${pctText}`;
                                        const fundingText = `Funding: ${formatCompactUsd(funding[idx])}`;
                                        const reqText = `Requirements: ${formatCompactUsd(requirements[idx])}`;
                                        return [coverageText, fundingText, reqText];
                                    },
                                },
                            },
                        },
                    },
                });
            });
        }


        // Map Initialization
        const map = L.map('map').setView([10, 20], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
        }).addTo(map);

        // Fetch Map Data and Draw Circles
        async function loadMapData(filters = '') {
            const response = await fetch(`/api/map-data?filters=${encodeURIComponent(filters)}`);
            const data = await response.json();
            
            // Clear existing markers if re-loading
            if (Object.keys(mapCircles).length > 0) {
                for (let id in mapCircles) {
                    map.removeLayer(mapCircles[id]);
                }
                mapCircles = {};
            }

            data.forEach(crisis => {
                const baseColor = crisis.color;
                
                // Use pixel-based radius so equal values look equal across latitudes.
                const radiusInPixels = Math.max(4, Math.min(42, crisis.radius_km * 0.12));

                const circle = L.circleMarker([crisis.latitude, crisis.longitude], {
                    color: baseColor,
                    fillColor: baseColor,
                    fillOpacity: 0.6,
                    weight: 2,
                    radius: radiusInPixels
                }).addTo(map);

                // Store reference for selection
                circle.baseColor = baseColor;
                mapCircles[crisis.code] = circle;

                circle.bindTooltip(`
                    <div class="p-1">
                        <div class="font-bold text-lg">${crisis.name}</div>
                        <div class="text-sm text-gray-600 mb-1">Locations: ${crisis.locations_display || 'Unknown'}</div>
                        <div class="text-sm font-extrabold mb-1" style="color: ${baseColor};">Severity Score: ${formatSeverityScore(crisis.overall_severity_score)}</div>
                        <div class="text-xs font-semibold text-blue-600">${crisis.people_in_need ? crisis.people_in_need.toLocaleString() + ' in need' : 'Unknown PIN'}</div>
                    </div>
                `, {
                    direction: 'top',
                    offset: [0, -radiusInPixels - 2],
                    className: 'crisis-tooltip'
                });

                circle.on('click', function() {
                    updateSelection(crisis.code);
                    htmx.ajax('GET', `/details/${crisis.code}`, {
                        target: '#side-panel-content',
                        swap: 'innerHTML'
                    });
                });
            });
        }

        loadMapData();

        function updateSelection(id) {
            // 1. Clear previous selections
            if (selectedCrisisId && mapCircles[selectedCrisisId]) {
                const prevCircle = mapCircles[selectedCrisisId];
                prevCircle.setStyle({ color: prevCircle.baseColor, weight: 2, fillOpacity: 0.6 });
            }
            document.querySelectorAll('.crisis-card').forEach(card => {
                card.classList.remove('border-blue-500', 'ring-4', 'ring-blue-100', 'bg-blue-50/30');
                card.classList.add('border-gray-200');
            });

            // 2. Set new selection
            selectedCrisisId = id;
            
            // Update Map
            if (mapCircles[id]) {
                const circle = mapCircles[id];
                circle.setStyle({ color: '#1d4ed8', weight: 5, fillOpacity: 0.8 });
                circle.bringToFront();
            }

            // Update List (if card exists in DOM)
            const card = document.getElementById(`card-${id}`);
            if (card) {
                card.classList.remove('border-gray-200');
                card.classList.add('border-blue-500', 'ring-4', 'ring-blue-100', 'bg-blue-50/30');
                card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // UI Helpers
        function updateSortControlsVisibility(activeTab) {
            const sortControls = document.getElementById('sort-controls');
            if (!sortControls) return;

            if (activeTab === 'map') {
                sortControls.classList.add('invisible');
            } else {
                sortControls.classList.remove('invisible');
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('bg-white', 'shadow-sm', 'font-semibold');
                el.classList.add('hover:bg-white/50');
            });

            const activeBtn = event.currentTarget;
            activeBtn.classList.remove('hover:bg-white/50');
            activeBtn.classList.add('bg-white', 'shadow-sm', 'font-semibold');

            document.getElementById(`tab-${tab}`).classList.add('active');
            updateSortControlsVisibility(tab);
            
            if (tab === 'map') {
                setTimeout(() => map.invalidateSize(), 100);
            } else if (tab === 'list' && selectedCrisisId) {
                // Re-apply list selection when switching back to list tab
                setTimeout(() => updateSelection(selectedCrisisId), 50);
            }
        }

        function openSidePanel() {
            sidePanel.classList.remove('w-0', 'border-transparent');
            sidePanel.classList.add('border-gray-200');
            sidePanel.style.width = `${defaultWidth}px`;
            setTimeout(() => map.invalidateSize(), 310);
        }

        function closeSidePanel() {
            sidePanel.classList.remove('border-gray-200');
            sidePanel.classList.add('w-0', 'border-transparent');
            sidePanel.style.width = '0px';
            
            // Clear selections when closing
            if (selectedCrisisId && mapCircles[selectedCrisisId]) {
                const circle = mapCircles[selectedCrisisId];
                circle.setStyle({ color: circle.baseColor, weight: 2, fillOpacity: 0.6 });
            }
            document.querySelectorAll('.crisis-card').forEach(card => {
                card.classList.remove('border-blue-500', 'ring-4', 'ring-blue-100', 'bg-blue-50/30');
                card.classList.add('border-gray-200');
            });
            selectedCrisisId = null;

            setTimeout(() => map.invalidateSize(), 310);
        }

        // Listen for HTMX events
        document.body.addEventListener('htmx:afterOnLoad', function(evt) {
            if (evt.detail.target.id === 'side-panel-content') {
                openSidePanel();
                initFundingLineCharts(evt.detail.target);
            }
            if (evt.detail.target.id === 'active-filters') {
                const isMapActive = document.getElementById('tab-map')?.classList.contains('active');
                updateSortControlsVisibility(isMapActive ? 'map' : 'list');
            }
            // If the list was re-loaded, re-apply selection if applicable
            if (evt.detail.target.id === 'list-container' && selectedCrisisId) {
                updateSelection(selectedCrisisId);
            }
        });

        // Listen for the custom HTMX event to refresh the map
        document.body.addEventListener('filters-changed', function() {
            const filtersInput = document.getElementById('hidden-filters-input');
            const filtersValue = filtersInput ? filtersInput.value : '{}';
            loadMapData(filtersValue);
        });

        // Global listener for list item clicks to sync with map
        document.body.addEventListener('click', function(e) {
            const card = e.target.closest('.crisis-card');
            if (card) {
                updateSelection(card.dataset.crisisId);
            }
        });

        function parseFiltersJson() {
            const filtersInput = document.getElementById('hidden-filters-input');
            if (!filtersInput || !filtersInput.value) return {};
            try {
                return JSON.parse(filtersInput.value);
            } catch {
                return {};
            }
        }

        function writeFiltersJson(nextFilters) {
            const filtersInput = document.getElementById('hidden-filters-input');
            if (!filtersInput) return;
            filtersInput.value = JSON.stringify(nextFilters);
            document.body.dispatchEvent(new CustomEvent('filters-changed'));
        }

        document.body.addEventListener('change', function(e) {
            if (e.target.id !== 'sort-field-select') return;

            const nextFilters = parseFiltersJson();
            const sortField = e.target.value;
            const directionToggle = document.getElementById('sort-direction-toggle');
            const sortDirection = directionToggle ? (directionToggle.dataset.direction || 'desc') : 'desc';

            if (!sortField) {
                delete nextFilters.order_by;
                writeFiltersJson(nextFilters);
                return;
            }

            nextFilters.order_by = { field: sortField, direction: sortDirection };
            writeFiltersJson(nextFilters);
        });

        document.body.addEventListener('click', function(e) {
            if (e.target.id !== 'sort-direction-toggle') return;

            const nextDirection = e.target.dataset.direction === 'asc' ? 'desc' : 'asc';
            e.target.dataset.direction = nextDirection;
            e.target.textContent = nextDirection.toUpperCase();

            const fieldSelect = document.getElementById('sort-field-select');
            if (!fieldSelect || !fieldSelect.value) {
                return;
            }

            const nextFilters = parseFiltersJson();
            nextFilters.order_by = { field: fieldSelect.value, direction: nextDirection };
            writeFiltersJson(nextFilters);
        });

        document.body.addEventListener('click', function(e) {
            const btn = e.target.closest('[data-funding-tab-button]');
            if (!btn) return;

            const container = btn.closest('[data-funding-tabs]');
            if (!container) return;

            const target = btn.dataset.fundingTabTarget;
            container.querySelectorAll('[data-funding-tab-button]').forEach((b) => {
                b.classList.remove('bg-white', 'text-blue-700', 'shadow-sm');
                b.classList.add('text-gray-600');
            });
            btn.classList.add('bg-white', 'text-blue-700', 'shadow-sm');
            btn.classList.remove('text-gray-600');

            container.querySelectorAll('[data-funding-tab-panel]').forEach((panel) => {
                if (panel.dataset.fundingTabPanel === target) {
                    panel.classList.remove('hidden');
                } else {
                    panel.classList.add('hidden');
                }
            });

            if (target === 'line') {
                initFundingLineCharts(container);
            }
        });

        updateSortControlsVisibility('map');
    </script>
</body>
</html>
